<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Library</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrapper">
      <h1>My Library</h1>
      <div class="form-add-book">
        <h2>Add Book</h2>
        <form action="submit">
          <ul class="list-input">
            <li class="input-item">
              <label for="title" class="label title">Title</label>
              <input
                type="text"
                name="title"
                id="title"
                class="input title"
                placeholder="Title of the book"
              />
            </li>
            <li class="input-item">
              <label for="author" class="label author">Author</label>
              <input
                type="text"
                name="author"
                id="author"
                class="input author"
                placeholder="Author of the book"
              />
            </li>
            <li class="input-item">
              <label for="pages" class="label pages">Pages number</label>
              <input
                type="text"
                name="pages"
                id="pages"
                class="input pages"
                pattern="numeric"
                placeholder="How many pages in the book"
              />
            </li>
            <li class="input-item">
              <label for="read" class="label read">Have you read it ?</label>
              <input type="checkbox" name="read" id="read" class="input read" />
            </li>
            <li class="input-item">
              <button class="add-btn">Add Book</button>
            </li>
          </ul>
        </form>
      </div>
      <div class="Library">
        <h2>My Books</h2>
        <ul class="list-books"></ul>
      </div>
    </div>
  </body>
</html>
